<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IT Support Dashboard</title>
    <link rel="stylesheet" href="dashboard-styles.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <header class="dashboard-header">
        <div class="header-left">
          <h1>IT Support Dashboard</h1>
        </div>
        <div class="header-right">
          <div class="user-badge">
            <span id="staffName">IT Staff</span>
            <button id="logoutBtn" class="logout-btn">Logout</button>
          </div>
        </div>
      </header>

      <div class="dashboard-content">
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-number" id="totalTickets">0</div>
            <div class="stat-label">Total Tickets</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="newTickets">0</div>
            <div class="stat-label">New Tickets</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="inProgressTickets">0</div>
            <div class="stat-label">In Progress</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="resolvedTickets">0</div>
            <div class="stat-label">Resolved</div>
          </div>
        </div>

        <div class="tickets-section">
          <div class="section-header">
            <h2>All Employee Tickets</h2>
            <div class="filter-group">
              <select id="statusFilter">
                <option value="">All Status</option>
                <option value="New">New</option>
                <option value="In Progress">In Progress</option>
                <option value="Resolved">Resolved</option>
              </select>
            </div>
          </div>

          <table id="allTicketsTable" class="tickets-table">
            <thead>
              <tr>
                <th>Ticket ID</th>
                <th>Employee</th>
                <th>Department</th>
                <th>Subject</th>
                <th>Type</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="ticketsBody">
              <tr>
                <td colspan="9" style="text-align: center; color: #999;">
                  No tickets available
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Update Status Modal -->
    <div id="statusModal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Update Ticket Status</h2>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
          <p id="modalTicketId"></p>
          <label>New Status</label>
          <select id="newStatus">
            <option>New</option>
            <option>In Progress</option>
            <option>Resolved</option>
          </select>
          <label>Notes (optional)</label>
          <textarea id="notes" placeholder="Add any notes..." rows="3"></textarea>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn-primary" onclick="updateStatus()">Update</button>
        </div>
      </div>
    </div>

    <script src="itsupport-dashboard.js"></script>
  </body>
</html>
