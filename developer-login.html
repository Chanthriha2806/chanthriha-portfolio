<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Developer Login</title>
    <link rel="stylesheet" href="login-styles.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h1>Developer Portal</h1>
          <p class="subtitle">System administration</p>
        </div>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="username">Developer ID</label>
            <input
              id="username"
              type="text"
              placeholder="Enter your developer ID"
              required
              autocomplete="username"
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              id="password"
              type="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
          </div>

          <button type="submit" class="login-btn">Login</button>

          <div id="loginError" class="error-message" style="display: none;"></div>
        </form>

        <div class="login-footer">
          <div style="background: #faf5ff; padding: 12px; border-radius: 6px; margin-bottom: 12px;">
            <p style="font-size: 12px; color: #5b21b6; margin: 0;">
              <strong>Demo Credentials:</strong><br>
              ID: developer | Password: dev@123
            </p>
          </div>
          <p class="back-link">
            <a href="index.html">← Back to role selection</a>
          </p>
        </div>
      </div>

      <div class="login-background">
        <div class="gradient-blob blob-1"></div>
        <div class="gradient-blob blob-2"></div>
        <div class="gradient-blob blob-3"></div>
      </div>
    </div>

    <script src="developer-login.js"></script>
  </body>
</html>
