<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Login</title>
    <link rel="stylesheet" href="login-styles.css" />
  </head>
  <style>
    /* Employee Login - Blue to Teal Gradient with animated blobs */
    body {
      background: linear-gradient(135deg, #1e40af 0%, #0369a1 50%, #0891b2 100%);
      animation: gradient-shift 8s ease infinite;
    }

    @keyframes gradient-shift {
      0%, 100% {
        background: linear-gradient(135deg, #1e40af 0%, #0369a1 50%, #0891b2 100%);
      }
      50% {
        background: linear-gradient(135deg, #0369a1 0%, #0891b2 50%, #06b6d4 100%);
      }
    }

    .blob-1 {
      background: rgba(59, 130, 246, 0.3);
      animation: float-1 6s ease-in-out infinite;
    }

    .blob-2 {
      background: rgba(6, 182, 212, 0.2);
      animation: float-2 8s ease-in-out infinite;
    }

    .blob-3 {
      background: rgba(139, 92, 246, 0.25);
      animation: float-3 7s ease-in-out infinite;
    }

    @keyframes float-1 {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
      50% { transform: translate(30px, -40px) scale(1.1) rotate(180deg); }
    }

    @keyframes float-2 {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
      50% { transform: translate(-40px, 30px) scale(0.9) rotate(-180deg); }
    }

    @keyframes float-3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, 20px) scale(1.05); }
    }
  </style>
      <div class="login-card">
        <div class="login-header">
          <h1>Employee Portal</h1>
          <p class="subtitle">Login to submit tickets</p>
        </div>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input
              id="username"
              type="text"
              placeholder="Enter your username"
              required
              autocomplete="username"
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              id="password"
              type="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
          </div>

          <button type="submit" class="login-btn">Login</button>

          <div id="loginError" class="error-message" style="display: none;"></div>
        </form>

        <div class="login-footer">
          <div>
            <strong>Demo Account Available</strong>
            <p style="font-size: 12px; margin-top: 6px;">
              Username: <strong>john</strong><br>
              Password: <strong>user123</strong>
            </p>
          </div>
          <div style="margin-top: 16px;">
            <strong>New to Help Desk?</strong>
            <p><a href="employee-signup.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create an account to get started</a></p>
          </div>
          <p class="back-link">
            <a href="index.html">← Back to role selection</a>
          </p>
        </div>
      </div>

      <div class="login-background">
        <div class="gradient-blob blob-1"></div>
        <div class="gradient-blob blob-2"></div>
        <div class="gradient-blob blob-3"></div>
      </div>
    </div>

    <script src="employee-login.js"></script>
  </body>
</html>
