<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Signup</title>
    <link rel="stylesheet" href="login-styles.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h1>Create Employee Account</h1>
          <p class="subtitle">Register to submit IT tickets</p>
        </div>

        <form id="signupForm" class="login-form">
          <div class="form-group">
            <label for="fullName">Full Name *</label>
            <input
              id="fullName"
              type="text"
              placeholder="Your full name"
              required
            />
          </div>

          <div class="form-group">
            <label for="employeeNumber">Employee Number *</label>
            <input
              id="employeeNumber"
              type="text"
              placeholder="e.g., EMP-001"
              required
            />
          </div>

          <div class="form-group">
            <label for="department">Department *</label>
            <input
              id="department"
              type="text"
              placeholder="e.g., Sales, HR, Finance"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email Address *</label>
            <input
              id="email"
              type="email"
              placeholder="your.email@company.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="username">Username *</label>
            <input
              id="username"
              type="text"
              placeholder="Choose a username"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password *</label>
            <input
              id="password"
              type="password"
              placeholder="Enter password (min 6 chars)"
              required
              minlength="6"
            />
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password *</label>
            <input
              id="confirmPassword"
              type="password"
              placeholder="Confirm your password"
              required
            />
          </div>

          <button type="submit" class="login-btn">Create Account</button>

          <div id="signupError" class="error-message" style="display: none;"></div>
          <div id="signupSuccess" class="success-message" style="display: none;"></div>
        </form>

        <div class="login-footer">
          <div>
            <strong>Already registered?</strong>
            <p><a href="employee-login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login to your account</a></p>
          </div>
          <p class="back-link">
            <a href="index.html">← Back to role selection</a>
          </p>
        </div>
      </div>

      <div class="login-background">
        <div class="gradient-blob blob-1"></div>
        <div class="gradient-blob blob-2"></div>
        <div class="gradient-blob blob-3"></div>
      </div>
    </div>

    <script src="employee-signup.js"></script>
  </body>
</html>
